<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Bee Practice</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --good: #15803d;
      --bad: #b91c1c;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button, select, input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      transition: transform 0.06s ease, opacity 0.2s ease, background 0.2s ease;
    }

    button:hover { opacity: 0.96; }
    button:active { transform: translateY(1px); }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    #nextBtn {
      background: #dc2626;
      color: white;
    }

    #nextBtn:disabled {
      background: #dc2626;
      color: white;
      opacity: 0.55;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: #eef2ff;
      color: #312e81;
    }

    .ghost {
      background: #f3f4f6;
      color: #111827;
    }

    .danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .checkline {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fafafa;
    }

    .checkline label {
      margin: 0;
      font-weight: 700;
      cursor: pointer;
    }

    .checkline input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #dc2626;
      margin: 0;
    }

    .historyActions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .fileRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }

    .fileRow input[type="file"] {
      flex: 1 1 260px;
      width: auto;
      border: 1px solid var(--border);
      background: white;
      border-radius: 14px;
      padding: 10px 12px;
    }

    .statusLine {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    .optionHint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .progressNote {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-weight: 400;
      display: none;
    }

    .checkline.isLocked {
      opacity: 0.72;
      background: #f3f4f6;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: 700;
    }

    select, input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      background: white;
      border-radius: 14px;
      padding: 13px 14px;
      outline: none;
    }

    select:focus, input[type="text"]:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    .promptBox {
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      padding: 18px;
      min-height: 170px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .result {
      margin-top: 16px;
      padding: 22px 20px;
      border-radius: 18px;
      font-weight: 900;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.15;
      text-align: center;
      display: none;
      letter-spacing: -0.02em;
    }

    .resultSub {
      display: block;
      margin-top: 10px;
      font-size: clamp(15px, 2.5vw, 19px);
      font-weight: 700;
      letter-spacing: normal;
    }

    .good {
      background: #dcfce7;
      color: var(--good);
      border: 1px solid #bbf7d0;
    }

    .bad {
      background: #fee2e2;
      color: var(--bad);
      border: 1px solid #fecaca;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: #fafafa;
    }

    .stat .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .stat .v {
      font-size: 26px;
      font-weight: 800;
    }

    .history {
      max-height: 420px;
      overflow: auto;
      border-top: 1px solid var(--border);
      margin-top: 14px;
      padding-top: 10px;
    }

    .historyItem {
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
      line-height: 1.55;
    }

    .muted { color: var(--muted); }
    .tiny { font-size: 12px; }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .wrap { padding: 16px; }
      .hero, .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="pill">Version 27</div>
      <h1>Spelling Bee Practice</h1>
    </section>

    <div class="grid">
      <section class="card">
        <h2 style="margin-top:0;">연습 진행</h2>

        <div id="reviewLoaderSection">
          <label for="loadModeSelect">불러오기 방식</label>
          <select id="loadModeSelect">
            <option value="resume">저장 시점 그대로 이어하기</option>
            <option value="wrongOnly">오답 단어만 복습하기</option>
          </select>
          
          <label for="historyFileInput">최근 기록 TXT 불러오기</label>
          <div class="fileRow">
            <input id="historyFileInput" type="file" accept=".txt,text/plain" />
            <button id="clearReviewBtn" class="ghost" type="button">불러오기 해제</button>
          </div>
          <div id="reviewStatus" class="statusLine" style="display:none;"></div>
        </div>

        <div id="practiceOptions">
          <label for="levelSelect">범위 선택</label>
          <select id="levelSelect">
            <option value="all">전체 단어</option>
            <option value="one">One Bee</option>
            <option value="two">Two Bee</option>
            <option value="three">Three Bee</option>
          </select>

          <div id="noRepeatWrap" class="checkline">
            <input id="noRepeatCheck" type="checkbox" checked />
            <label for="noRepeatCheck">같은 단어 다시 나오지 않기</label>
          </div>
        </div>

        <div id="progressNote" class="progressNote"></div>

        <label for="answerInput">철자 입력</label>
        <input id="answerInput" type="text" placeholder="예: beautiful" autocomplete="off" />

        <div class="row">
          <button id="nextBtn" class="primary">시작하기</button>
          <button id="speakBtn" class="secondary">다시 읽기</button>
          <button id="checkBtn" class="ghost">제출하기</button>
          <button id="advanceBtn" class="primary">다음 문제</button>
        </div>

        <div id="promptBox" class="promptBox">시작하기를 누르면 첫 문제를 냅니다.</div>
        <div id="resultBox" class="result"></div>
        <div id="detailBox" class="detailBox"></div>
      </section>

      <aside class="card">
        <h2 style="margin-top:0;">점수판</h2>
        <div class="stats">
          <div class="stat">
            <div class="k">총 문제</div>
            <div id="totalCount" class="v">0</div>
          </div>
          <div class="stat">
            <div class="k">정답</div>
            <div id="correctCount" class="v">0</div>
          </div>
          <div class="stat">
            <div class="k">오답</div>
            <div id="wrongCount" class="v">0</div>
          </div>
          <div class="stat">
            <div class="k">정답률</div>
            <div id="accuracy" class="v">0%</div>
          </div>
        </div>

        <div class="history">
          <div style="font-weight:800; margin-bottom:8px;">최근 기록</div>
          <div id="historyList" class="muted">아직 기록이 없습니다.</div>
          <div class="historyActions">
            <button id="saveHistoryBtn" class="ghost">최근 기록 TXT 저장</button>
          </div>
        </div>

      </aside>
    </div>
  </div>

    const PREFERRED_SPELLINGS = {
      cosy: 'cozy',
      mustache: 'moustache',
      artefacts: 'artifacts',
      sarape: 'serape',
      charollais: 'Charolais'
    };

    const SPEECH_HINTS = {
      'señor': 'sen-YOR',
      'lo mein': 'loh main',
      'sans serif': 'sans SAIR-if',
      'et cetera': 'et SET-er-uh',
      'serape': 'seh-RAH-pay',
      'au revoir': 'oh ruh-VWAHR',

    function createEmptyUsedWordsByScope() {
      return {
        all: new Set(),
        one: new Set(),
        two: new Set(),
        three: new Set(),
        review: new Set()
      };
    }

    function normalizeForCompare(value) {
      return String(value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[’`´]/g, "'")
        .replace(/[^a-z' ]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getPreferredWord(word) {
      const normalized = normalizeForCompare(word);
      for (const [alternate, preferred] of Object.entries(PREFERRED_SPELLINGS)) {
        if (normalizeForCompare(alternate) === normalized) return preferred;
      }
      return word;
    }

    function buildKnownWordMap() {
      const map = new Map();
      [...WORDS.one, ...WORDS.two, ...WORDS.three].forEach(word => {
        const preferred = getPreferredWord(word);
        map.set(normalizeForCompare(word), preferred);
        map.set(normalizeForCompare(preferred), preferred);
      });
      return map;
    }

    const KNOWN_WORD_MAP = buildKnownWordMap();

    function resolveKnownWord(word) {
      if (!word) return null;
      return KNOWN_WORD_MAP.get(normalizeForCompare(word)) || null;
    }

    function getPoolKey() {
      return state.reviewMode ? 'review' : state.currentLevel;
    }

    function levelLabel(value) {
      return value === 'one' ? 'One Bee' : value === 'two' ? 'Two Bee' : value === 'three' ? 'Three Bee' : '전체';
    }

    function currentPracticeLabel() {
      return state.reviewMode ? '오답 복습' : levelLabel(state.currentLevel);
    }

    function getPoolWordsForScope(scopeKey, options = {}) {
      const currentLevel = options.currentLevel || state.currentLevel;
      const reviewMode = options.reviewMode !== undefined ? options.reviewMode : state.reviewMode;
      const reviewWrongWords = options.reviewWrongWords || state.reviewWrongWords;

      if ((scopeKey === 'review' || reviewMode) && reviewWrongWords.length > 0) {
        return Array.from(new Set(reviewWrongWords.map(getPreferredWord)));
      }

      let pool = [];
      if (scopeKey === 'one' || currentLevel === 'one' && scopeKey === 'all') pool = WORDS.one;
      else if (scopeKey === 'two' || currentLevel === 'two' && scopeKey === 'all') pool = WORDS.two;
      else if (scopeKey === 'three' || currentLevel === 'three' && scopeKey === 'all') pool = WORDS.three;
      else if (scopeKey === 'one') pool = WORDS.one;
      else if (scopeKey === 'two') pool = WORDS.two;
      else if (scopeKey === 'three') pool = WORDS.three;
      else {
        if (currentLevel === 'one') pool = WORDS.one;
        else if (currentLevel === 'two') pool = WORDS.two;
        else if (currentLevel === 'three') pool = WORDS.three;
        else pool = [...WORDS.one, ...WORDS.two, ...WORDS.three];
      }

      return Array.from(new Set(pool.map(getPreferredWord)));
    }

    function getWordPool() {
      if (state.reviewMode && state.reviewWrongWords.length > 0) {
        return Array.from(new Set(state.reviewWrongWords.map(getPreferredWord)));
      }

      if (state.currentLevel === 'one') return Array.from(new Set(WORDS.one.map(getPreferredWord)));
      if (state.currentLevel === 'two') return Array.from(new Set(WORDS.two.map(getPreferredWord)));
      if (state.currentLevel === 'three') return Array.from(new Set(WORDS.three.map(getPreferredWord)));

      return Array.from(new Set([...WORDS.one, ...WORDS.two, ...WORDS.three].map(getPreferredWord)));
    }

    function getCurrentPoolSize() {
      return getWordPool().length;
    }

    function pickRandomWord() {
      const pool = getWordPool();
      if (pool.length === 0) return null;

      if (!el.noRepeatCheck.checked) {
        const index = Math.floor(Math.random() * pool.length);
        return pool[index];
      }

      const key = getPoolKey();
      const usedSet = state.usedWordsByScope[key] || new Set();
      let candidates = pool.filter(word => !usedSet.has(normalizeForCompare(word)));

      if (candidates.length === 0) {
        state.usedWordsByScope[key] = new Set();
        candidates = [...pool];
      }

      const index = Math.floor(Math.random() * candidates.length);
      const chosen = candidates[index];
      state.usedWordsByScope[key].add(normalizeForCompare(chosen));
      return chosen;
    }

    function getAcceptedForms(word) {
      return [getPreferredWord(word)];
    }

    function getDetailKeyForWord(word) {
      const normalized = normalizeForCompare(getPreferredWord(word));
      if (DETAILS[normalized]) return normalized;
      return null;
    }

    function getWordToSpeak(word) {
      return SPEECH_HINTS[word] || word;
    }

    function speakWordPrompt(word, questionNumber = null, cancelPrevious = true) {
      const spokenWord = getWordToSpeak(word);
      const prefix = questionNumber ? `Question ${questionNumber}. ` : '';
      return speak(`${prefix}Your word is ${spokenWord}. Please spell the word.`, 0.9, cancelPrevious);
    }

    function estimateSpeechMs(text, rate = 0.9) {
      const words = text.trim().split(/\s+/).filter(Boolean).length || 1;
      return Math.max(900, words * (rate < 0.8 ? 520 : 380));
    }

    function speak(text, rate = 0.9, cancelPrevious = true) {
      const estimated = estimateSpeechMs(text, rate);
      if (!('speechSynthesis' in window)) return estimated;
      if (cancelPrevious) window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-US';
      utter.rate = rate;
      utter.pitch = 1;
      utter.volume = 1;
      window.speechSynthesis.speak(utter);
      return estimated;
    }

    function playTone(ok) {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        if (ctx.state === 'suspended') ctx.resume();

        const notes = ok
          ? [
              { freq: 880, start: 0.00, end: 0.16, type: 'sine', gain: 0.22 },
              { freq: 1174, start: 0.17, end: 0.34, type: 'sine', gain: 0.24 }
            ]
          : [
              { freq: 392, start: 0.00, end: 0.18, type: 'square', gain: 0.20 },
              { freq: 220, start: 0.19, end: 0.43, type: 'square', gain: 0.24 }
            ];

        notes.forEach(note => {
          const oscillator = ctx.createOscillator();
          const gain = ctx.createGain();
          oscillator.type = note.type;
          oscillator.frequency.setValueAtTime(note.freq, ctx.currentTime + note.start);
          gain.gain.setValueAtTime(0.0001, ctx.currentTime + note.start);
          gain.gain.exponentialRampToValueAtTime(note.gain, ctx.currentTime + note.start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + note.end);
          oscillator.connect(gain);
          gain.connect(ctx.destination);
          oscillator.start(ctx.currentTime + note.start);
          oscillator.stop(ctx.currentTime + note.end + 0.02);
        });
      } catch (e) {
      }
    }

    function spellOutWord(word) {
      const chars = Array.from(word);
      const spoken = chars.map(ch => {
        if (ch === ' ') return 'space';
        if (ch === "'") return 'apostrophe';
        if (ch === '-') return 'hyphen';
        return ch;
      });
      return spoken.join(', ');
    }

    function safeNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) && n >= 0 ? n : fallback;
    }

    function normalizeScopeKey(value, fallback = 'all') {
      return ['all', 'one', 'two', 'three', 'review'].includes(value) ? value : fallback;
    }

    function sanitizeHistoryItem(item) {
      if (!item || typeof item !== 'object') return null;

      const resolvedWord = resolveKnownWord(item.word);
      if (!resolvedWord) return null;

      const scopeKey = normalizeScopeKey(
        item.scopeKey,
        item.levelLabel === 'One Bee'
          ? 'one'
          : item.levelLabel === 'Two Bee'
            ? 'two'
            : item.levelLabel === 'Three Bee'
              ? 'three'
              : item.levelLabel === '오답 복습'
                ? 'review'
                : 'all'
      );

      const levelLabelText = item.levelLabel || (scopeKey === 'review' ? '오답 복습' : levelLabel(scopeKey));

      return {
        questionNumber: safeNumber(item.questionNumber, 0),
        word: resolvedWord,
        answer: String(item.answer || ''),
        ok: Boolean(item.ok),
        levelLabel: levelLabelText,
        scopeKey
      };
    }

    function serializeUsedWordsByScope() {
      const result = {};
      Object.entries(state.usedWordsByScope).forEach(([key, set]) => {
        result[key] = Array.from(set || []).map(value => resolveKnownWord(value) || value);
      });
      return result;
    }

    function deriveUsedWordsByScopeFromHistory(history, snapshotState = {}) {
      const used = createEmptyUsedWordsByScope();

      history.forEach(item => {
        if (!item || !item.word) return;
        const key = normalizeScopeKey(item.scopeKey, 'all');
        used[key].add(normalizeForCompare(item.word));
      });

      if (snapshotState.started && snapshotState.currentWord && snapshotState.noRepeatChecked) {
        const currentScope = snapshotState.reviewMode ? 'review' : normalizeScopeKey(snapshotState.currentLevel, 'all');
        used[currentScope].add(normalizeForCompare(snapshotState.currentWord));
      }

      return used;
    }

    function createSessionSnapshot() {
      return {
        format: 'spelling-bee-session',
        version: 27,
        savedAt: new Date().toISOString(),
        state: {
          currentWord: state.currentWord,
          currentLevel: state.currentLevel,
          total: state.total,
          correct: state.correct,
          wrong: state.wrong,
          history: state.history.map(item => ({
            questionNumber: item.questionNumber,
            word: item.word,
            answer: item.answer,
            ok: item.ok,
            levelLabel: item.levelLabel,
            scopeKey: item.scopeKey || 'all'
          })),
          awaitingAnswer: state.awaitingAnswer,
          started: state.started,
          currentQuestionNumber: state.currentQuestionNumber,
          currentWordOrder: state.currentWordOrder,
          awaitingNext: state.awaitingNext,
          reviewMode: state.reviewMode,
          reviewWrongWords: state.reviewWrongWords.slice(),
          reviewSourceName: state.reviewSourceName,
          noRepeatChecked: el.noRepeatCheck.checked,
          lastResult: state.lastResult ? { ...state.lastResult } : null,
          usedWordsByScope: serializeUsedWordsByScope()
        }
      };
    }

    function getProgressInfoFromStateSnapshot(snapshotState) {
      if (!snapshotState) return null;

      if (!snapshotState.noRepeatChecked) {
        if (!snapshotState.started && safeNumber(snapshotState.total, 0) === 0) return null;
        return {
          label: '진행한 문제 수',
          count: safeNumber(snapshotState.total, 0),
          totalWords: null
        };
      }

      const scopeKey = snapshotState.reviewMode ? 'review' : normalizeScopeKey(snapshotState.currentLevel, 'all');
      const usedWords = snapshotState.usedWordsByScope || {};
      const rawUsed = Array.isArray(usedWords[scopeKey]) ? usedWords[scopeKey] : [];
      const usedSet = new Set(rawUsed.map(word => normalizeForCompare(resolveKnownWord(word) || word)).filter(Boolean));

      const totalWords = getPoolWordsForScope(scopeKey, {
        currentLevel: snapshotState.currentLevel,
        reviewMode: snapshotState.reviewMode,
        reviewWrongWords: snapshotState.reviewWrongWords || []
      }).length;

      let count = Math.min(usedSet.size, totalWords);
      if (safeNumber(snapshotState.currentWordOrder, 0) > count) {
        count = Math.min(safeNumber(snapshotState.currentWordOrder, 0), totalWords);
      }

      if (!snapshotState.started && count === 0 && safeNumber(snapshotState.total, 0) === 0) return null;

      return {
        label: '진행한 단어 수',
        count,
        totalWords
      };
    }

    function buildHistoryText() {
      const snapshot = createSessionSnapshot();
      const savedState = snapshot.state;
      const progressInfo = getProgressInfoFromStateSnapshot(savedState);

      const lines = [
        'Spelling Bee Practice Recent History',
        `Saved at: ${new Date(snapshot.savedAt).toLocaleString()}`,
        `Range: ${savedState.reviewMode ? '오답 복습' : levelLabel(savedState.currentLevel)}`,
        `No-repeat option: ${savedState.noRepeatChecked ? 'ON' : 'OFF'}`
      ];

      if (progressInfo) {
        if (progressInfo.totalWords == null) {
          lines.push(`${progressInfo.label}: ${progressInfo.count}`);
        } else {
          lines.push(`${progressInfo.label}: ${progressInfo.count} / ${progressInfo.totalWords}`);
        }
      }

      if (savedState.started) {
        if (savedState.awaitingAnswer && savedState.currentWord) {
          lines.push(`Current question: ${savedState.currentQuestionNumber} (in progress)`);
        } else if (savedState.awaitingNext) {
          lines.push(`Current question: ${savedState.currentQuestionNumber} (waiting for next)`);
        }
      }

      lines.push(
        '',
        `Total: ${state.total}`,
        `Correct: ${state.correct}`,
        `Wrong: ${state.wrong}`,
        `Accuracy: ${el.accuracy.textContent}`,
        '',
        'Recent Records',
        '------------------------------'
      );

      if (state.history.length === 0) {
        lines.push('No records yet.');
      } else {
        state.history.forEach(item => {
          lines.push(
            `Question ${item.questionNumber} | ${item.ok ? 'Correct' : 'Wrong'} | ${item.levelLabel}`,
            `Word: ${item.word}`,
            `Answer: ${item.answer || '(blank)'}`,
            ''
          );
        });
      }

      lines.push(
        '',
        '=== SESSION SNAPSHOT START ===',
        JSON.stringify(snapshot, null, 2),
        '=== SESSION SNAPSHOT END ==='
      );

      return lines.join('\n');
    }

    function saveHistoryAsText() {
      const blob = new Blob([buildHistoryText()], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const stamp = new Date().toISOString().replace(/[:.]/g, '-');
      link.href = url;
      link.download = `spelling-bee-history-${stamp}.txt`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function parseWrongWordsFromHistoryText(text) {
      const lines = text.split(/\r?\n/);
      const wrongWords = [];

      for (let i = 0; i < lines.length; i += 1) {
        const header = lines[i].trim();
        if (!/^Question\s+\d+\s*\|\s*Wrong\s*\|/i.test(header)) continue;

        const wordLine = (lines[i + 1] || '').trim();
        const match = wordLine.match(/^Word:\s*(.+?)\s*$/i);
        if (!match) continue;

        const resolved = resolveKnownWord(match[1]);
        if (resolved) wrongWords.push(resolved);
      }

      return Array.from(new Set(wrongWords));
    }

    function extractSessionSnapshot(text) {
      const match = text.match(/=== SESSION SNAPSHOT START ===\s*([\s\S]*?)\s*=== SESSION SNAPSHOT END ===/);
      if (!match) return null;

      try {
        const parsed = JSON.parse(match[1]);
        if (parsed && parsed.format === 'spelling-bee-session' && parsed.state) {
          return parsed;
        }
      } catch (error) {
      }

      return null;
    }

      el.resultBox.style.display = 'none';

    function focusAnswerInput() {

      }, 0);
    }

    function resetPracticeState(options = {}) {
      const preserveFileInput = Boolean(options.preserveFileInput);
      clearTimeout(state.autoNextTimer);
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();

      state.currentWord = null;
      state.currentLevel = 'all';
      state.total = 0;
      state.correct = 0;
      state.wrong = 0;
      state.history = [];
      state.awaitingAnswer = false;
      state.started = false;
      state.autoNextTimer = null;
      state.currentQuestionNumber = 0;
      state.currentWordOrder = 0;
      state.awaitingNext = false;
      state.reviewMode = false;
      state.reviewWrongWords = [];
      state.reviewSourceName = '';
      state.reviewStatusMessage = '';
      state.lastResult = null;
      state.loadedSnapshotFileName = '';
      state.loadedSnapshotSavedAt = '';
      state.loadedFileMode = '';
      state.usedWordsByScope = createEmptyUsedWordsByScope();

      el.levelSelect.value = 'all';
      el.noRepeatCheck.checked = true;
      el.answerInput.value = '';
      if (el.loadModeSelect && !preserveFileInput) el.loadModeSelect.value = 'resume';
      if (el.historyFileInput && !preserveFileInput) el.historyFileInput.value = '';
      hideResultAndDetails();
    }

    function showResult(ok, answerText, wordOverride = null) {
      const displayWord = wordOverride || state.currentWord;
      el.resultBox.style.display = 'block';
      el.resultBox.className = `result ${ok ? 'good' : 'bad'}`;
      el.resultBox.innerHTML = ok
        ? `정답!<span class="resultSub">${displayWord}</span>`
        : `오답<span class="resultSub">정답: ${getAcceptedForms(displayWord).join(' / ')}<br>입력: ${answerText || '(빈칸)'}</span>`;
      renderAnswerLabels(displayWord);
    }

    function restoreResultView() {
      if (state.awaitingNext && state.lastResult && state.lastResult.word) {
        showResult(Boolean(state.lastResult.ok), state.lastResult.answer || '', state.lastResult.word);
      } else {
        hideResultAndDetails();
      }
    }

    function applyLoadedUsedWords(rawUsedWords, fallbackHistory) {
      const nextUsedWords = createEmptyUsedWordsByScope();
      let restoredAnything = false;

      if (rawUsedWords && typeof rawUsedWords === 'object') {
        Object.keys(nextUsedWords).forEach(key => {
          const values = Array.isArray(rawUsedWords[key]) ? rawUsedWords[key] : [];
          values.forEach(word => {
            const resolved = resolveKnownWord(word);
            if (!resolved) return;
            nextUsedWords[key].add(normalizeForCompare(resolved));
            restoredAnything = true;
          });
        });
      }

      if (!restoredAnything) {
        return deriveUsedWordsByScopeFromHistory(fallbackHistory, {
          started: state.started,
          currentWord: state.currentWord,
          noRepeatChecked: el.noRepeatCheck.checked,
          reviewMode: state.reviewMode,
          currentLevel: state.currentLevel
        });
      }

      if (state.started && state.currentWord && el.noRepeatCheck.checked) {
        const key = getPoolKey();
        nextUsedWords[key].add(normalizeForCompare(state.currentWord));
      }

      return nextUsedWords;
    }

    function extractWrongWordsFromSnapshot(snapshot) {
      const snapshotState = snapshot && snapshot.state ? snapshot.state : null;
      if (!snapshotState) return [];

      const wrongWords = [];

      if (Array.isArray(snapshotState.history)) {
        snapshotState.history.forEach(item => {
          const sanitized = sanitizeHistoryItem(item);
          if (sanitized && !sanitized.ok) wrongWords.push(sanitized.word);
        });
      }

      if (wrongWords.length === 0 && Array.isArray(snapshotState.reviewWrongWords)) {
        snapshotState.reviewWrongWords.forEach(word => {
          const resolved = resolveKnownWord(word);
          if (resolved) wrongWords.push(resolved);
        });
      }

      return Array.from(new Set(wrongWords));
    }

    function applyWrongWordReview(wrongWords, fileName) {
      resetPracticeState({ preserveFileInput: true });

      if (wrongWords.length === 0) {
        state.reviewStatusMessage = '이 TXT 안에서 오답 단어를 찾지 못했습니다.';
        updateStats();
        renderHistory();
        renderPrompt();
        updateControls();
        return;
      }

      state.reviewMode = true;
      state.reviewWrongWords = wrongWords;
      state.reviewSourceName = fileName || '';
      state.loadedFileMode = 'wrongOnly';
      state.reviewStatusMessage = '';
      updateStats();
      renderHistory();
      renderPrompt();
      updateControls();
    }

    function applyLoadedText(text, fileName) {
      const snapshot = extractSessionSnapshot(text);
      const loadMode = el.loadModeSelect ? el.loadModeSelect.value : 'resume';

      if (loadMode === 'resume') {
        if (snapshot) {
          applySessionSnapshot(snapshot, fileName);
          return;
        }

        resetPracticeState({ preserveFileInput: true });
        state.reviewStatusMessage = '이 파일에는 이어하기용 세션 정보가 없습니다. 불러오기 방식을 “오답 단어만 복습하기”로 바꾸면 사용할 수 있습니다.';
        updateStats();
        renderHistory();
        renderPrompt();
        updateControls();
        return;
      }

      const wrongWords = snapshot ? extractWrongWordsFromSnapshot(snapshot) : parseWrongWordsFromHistoryText(text);
      applyWrongWordReview(wrongWords, fileName);
    }

    function applySessionSnapshot(snapshot, fileName) {
      resetPracticeState({ preserveFileInput: true });

      const snapshotState = snapshot && snapshot.state ? snapshot.state : null;
      if (!snapshotState) throw new Error('invalid snapshot');

      state.currentLevel = normalizeScopeKey(snapshotState.currentLevel, 'all');
      el.levelSelect.value = state.currentLevel;
      el.noRepeatCheck.checked = snapshotState.noRepeatChecked !== false;

      state.total = safeNumber(snapshotState.total, 0);
      state.correct = safeNumber(snapshotState.correct, 0);
      state.wrong = safeNumber(snapshotState.wrong, 0);
      state.currentQuestionNumber = safeNumber(snapshotState.currentQuestionNumber, Math.max(state.total + 1, 1));
      state.currentWordOrder = safeNumber(snapshotState.currentWordOrder, 0);
      state.started = Boolean(snapshotState.started);
      state.awaitingAnswer = Boolean(snapshotState.awaitingAnswer);
      state.awaitingNext = Boolean(snapshotState.awaitingNext);

      state.reviewMode = Boolean(snapshotState.reviewMode);
      state.reviewWrongWords = Array.isArray(snapshotState.reviewWrongWords)
        ? Array.from(new Set(snapshotState.reviewWrongWords.map(resolveKnownWord).filter(Boolean)))
        : [];
      state.reviewSourceName = String(snapshotState.reviewSourceName || '');

      state.currentWord = resolveKnownWord(snapshotState.currentWord);
      state.history = Array.isArray(snapshotState.history)
        ? snapshotState.history.map(sanitizeHistoryItem).filter(Boolean)
        : [];

      const loadedLastResult = snapshotState.lastResult && typeof snapshotState.lastResult === 'object'
        ? {
            ok: Boolean(snapshotState.lastResult.ok),
            answer: String(snapshotState.lastResult.answer || ''),
            word: resolveKnownWord(snapshotState.lastResult.word) || state.currentWord || (state.history.length ? state.history[state.history.length - 1].word : null)
          }
        : null;

      state.lastResult = loadedLastResult;

      if (!state.lastResult && state.awaitingNext) {
        const lastHistory = state.history[state.history.length ? state.history.length - 1 : -1];
        if (lastHistory && state.currentWord && normalizeForCompare(lastHistory.word) === normalizeForCompare(state.currentWord)) {
          state.lastResult = {
            ok: Boolean(lastHistory.ok),
            answer: lastHistory.answer || '',
            word: state.currentWord
          };
        }
      }

      state.usedWordsByScope = applyLoadedUsedWords(snapshotState.usedWordsByScope, state.history);

      if (state.reviewMode && state.reviewWrongWords.length === 0) {
        state.reviewMode = false;
      }

      if (!state.started) {
        state.awaitingAnswer = false;
        state.awaitingNext = false;
        state.currentWord = null;
        state.lastResult = null;
      }

      if (state.started && !state.currentWord) {
        state.awaitingAnswer = false;
        state.awaitingNext = false;
      }

      state.loadedSnapshotFileName = fileName || '';
      state.loadedSnapshotSavedAt = String(snapshot.savedAt || '');
      state.loadedFileMode = 'resume';

      el.answerInput.value = '';
      updateStats();
      renderHistory();
      renderPrompt();
      restoreResultView();
      updateControls();

      if (state.awaitingAnswer) {
        el.answerInput.focus();
      }
    }

    async function loadSessionOrWrongWordsFromFile(file) {
      try {
        const text = await file.text();
        loadedFileCache.text = text;
        loadedFileCache.name = file.name;
        applyLoadedText(text, file.name);
      } catch (error) {
        resetPracticeState({ preserveFileInput: true });
        state.reviewStatusMessage = 'TXT 파일을 읽는 중 문제가 발생했습니다.';
        updateStats();
        renderHistory();
        renderPrompt();
        updateControls();
      }
    }

    function clearLoadedPracticeFile() {
      if (state.started) return;
      loadedFileCache.text = '';
      loadedFileCache.name = '';
      resetPracticeState();
      updateStats();
      renderHistory();
      renderPrompt();
      updateControls();
    }

    function updateReviewStatus() {
      if (!el.reviewStatus) return;

      let message = '';

      if (state.loadedSnapshotFileName) {
        const savedAtText = state.loadedSnapshotSavedAt
          ? new Date(state.loadedSnapshotSavedAt).toLocaleString()
          : '';
        message = `불러온 파일: ${state.loadedSnapshotFileName} · 이어하기 모드`;
        if (savedAtText) message += ` · 저장 시각 ${savedAtText}`;
      } else if (state.reviewMode && state.reviewWrongWords.length > 0) {
        message = `불러온 파일: ${state.reviewSourceName} · 오답 복습 모드 · 오답 단어 ${state.reviewWrongWords.length}개`;
      } else if (state.reviewStatusMessage) {
        message = state.reviewStatusMessage;
      }

      el.reviewStatus.textContent = message;
      el.reviewStatus.style.display = message ? 'block' : 'none';

      if (el.clearReviewBtn) {
        el.clearReviewBtn.textContent = '불러오기 해제';
        el.clearReviewBtn.disabled = state.started || (!loadedFileCache.text && !state.loadedSnapshotFileName && !state.reviewMode && !state.reviewStatusMessage);
      }
    }

    function getProgressDisplayInfo() {
      if (el.noRepeatCheck.checked) {
        const totalWords = getCurrentPoolSize();
        if (totalWords === 0) return null;

        let completedCount = 0;
        const usedSet = state.usedWordsByScope[getPoolKey()] || new Set();
        completedCount = usedSet.size;

        if (state.currentWordOrder > completedCount) {
          completedCount = state.currentWordOrder;
        }

        completedCount = Math.min(completedCount, totalWords);

        if (!state.started && state.total === 0 && !state.loadedSnapshotFileName && !state.reviewMode) {
          return null;
        }

        return {
          text: `진행한 단어 수: ${completedCount} / ${totalWords}`
        };
      }

      if (!state.started && state.total === 0 && !state.loadedSnapshotFileName && !state.reviewMode) {
        return null;
      }

      return {
        text: `진행한 문제 수: ${state.total}`
      };
    }

    function updateProgressNote() {
      const info = getProgressDisplayInfo();
      if (!info) {
        el.progressNote.style.display = 'none';
        el.progressNote.textContent = '';
        return;
      }

      el.progressNote.style.display = 'block';
      el.progressNote.textContent = info.text;
    }

    function renderAnswerLabels(word) {
      el.detailBox.innerHTML = '';
      el.detailBox.style.display = 'none';

      const key = getDetailKeyForWord(word);
      if (!key || !DETAILS[key]) {
        el.promptBox.innerHTML = [
          `<strong>단어 :</strong> ${word}`,
          '',
          '<strong>한글 :</strong> -',
          '',
          '<strong>영영 사전 :</strong> -',
          '',
          '<strong>예문 :</strong> -'
        ].join('<br>');
        el.detailBox.style.display = 'none';
        return;
      }

      const info = DETAILS[key];
      el.promptBox.innerHTML = [
        `<strong>단어 :</strong> ${info.word || word}`,
        '',
        `<strong>한글 :</strong> ${info.ko || '-'}`,
        '',
        `<strong>영영 사전 :</strong> ${info.en || '-'}`,
        '',
        `<strong>예문 :</strong> ${info.ex || '-'}`
      ].join('<br>');

      el.detailBox.style.display = 'none';
    }

    function updateStats() {
      el.totalCount.textContent = state.total;
      el.correctCount.textContent = state.correct;
      el.wrongCount.textContent = state.wrong;
      const pct = state.total === 0 ? 0 : Math.round((state.correct / state.total) * 100);
      el.accuracy.textContent = `${pct}%`;
    }

    function renderHistory() {
      if (state.history.length === 0) {
        el.historyList.innerHTML = '<div class="muted">아직 기록이 없습니다.</div>';
        return;
      }

      el.historyList.innerHTML = state.history
        .slice()
        .reverse()
        .map(item => `
          <div class="historyItem">
            <div><strong>${item.ok ? '정답' : '오답'}</strong> · <span class="muted">${item.levelLabel}</span></div>
            <div>문제 ${item.questionNumber}</div>
            <div>단어: <strong>${item.word}</strong></div>
            <div>입력: ${item.answer || '<span class="muted">(빈칸)</span>'}</div>
          </div>
        `)
        .join('');
    }

    function renderPrompt() {
      if (!state.started) {
        if (state.loadedSnapshotFileName) {
          el.promptBox.textContent = '저장된 진행 상태를 불러왔습니다.\n시작하기를 누르면 이어서 진행합니다.';
        } else if (state.reviewMode && state.reviewWrongWords.length > 0) {
          el.promptBox.textContent = `불러온 오답 단어 ${state.reviewWrongWords.length}개로 연습할 준비가 되었습니다.\n시작하기를 누르면 오답 단어만 다시 물어봅니다.`;
        } else {
          el.promptBox.textContent = '시작하기를 누르면 첫 문제를 냅니다.';
        }
        updateProgressNote();
        return;
      }

      if (!state.currentWord) {
        el.promptBox.textContent = `현재 범위: ${currentPracticeLabel()}\n다음 문제를 준비하고 있습니다.`;
        updateProgressNote();
        return;
      }

      if (state.awaitingNext) {
        el.promptBox.textContent = [
          `문제 ${state.currentQuestionNumber}`,
          '',
          '정답 확인이 끝났습니다.',
          '"다음 문제"를 누르면 이어서 진행합니다.'
        ].join('\n');
        updateProgressNote();
        return;
      }

      const prompt = [
        `문제 ${state.currentQuestionNumber}`,
        '',
        '진행자: Your word is ready.',
        '',
        '단어를 들은 뒤 철자를 입력하고 제출하세요.',
        '필요하면 “다시 읽기”를 눌러 다시 들을 수 있습니다.'
      ].join('\n');

      el.promptBox.textContent = prompt;
      updateProgressNote();
    }

    function updateControls() {
      if (!state.started && state.total > 0 && state.loadedSnapshotFileName) {
        el.nextBtn.textContent = '이어하기';
      } else {
        el.nextBtn.textContent = state.started ? '진행 중' : '시작하기';
      }

      el.nextBtn.disabled = state.started;
      el.noRepeatCheck.disabled = state.started;
      el.noRepeatWrap.classList.toggle('isLocked', state.started);
      el.practiceOptions.style.display = state.started ? 'none' : 'block';
      if (el.reviewLoaderSection) el.reviewLoaderSection.style.display = state.started ? 'none' : 'block';
      if (el.loadModeSelect) el.loadModeSelect.disabled = state.started;
      if (el.historyFileInput) el.historyFileInput.disabled = state.started;
      el.answerInput.disabled = !state.awaitingAnswer;
      el.checkBtn.disabled = !state.awaitingAnswer;
      el.advanceBtn.disabled = !state.awaitingNext;
      el.speakBtn.disabled = !state.currentWord;
      updateReviewStatus();
      updateProgressNote();
    }

    function askNewWord(questionNumber = null, announceNumber = false) {
      clearTimeout(state.autoNextTimer);
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();

      state.started = true;
      state.currentQuestionNumber = questionNumber ?? (state.total + 1);
      state.currentWord = pickRandomWord();
      state.lastResult = null;

      if (!state.currentWord) {
        state.started = false;
        state.awaitingAnswer = false;
        state.awaitingNext = false;
        el.promptBox.textContent = '연습할 단어가 없습니다.';
        hideResultAndDetails();
        updateControls();
        return;
      }

      const usedSet = state.usedWordsByScope[getPoolKey()] || new Set();
      state.currentWordOrder = el.noRepeatCheck.checked ? usedSet.size : state.total + 1;
      state.awaitingAnswer = true;
      state.awaitingNext = false;
      el.answerInput.value = '';
      focusAnswerInput();
      hideResultAndDetails();
      renderPrompt();
      updateControls();

      speakWordPrompt(state.currentWord, announceNumber ? state.currentQuestionNumber : null);
    }

    function moveToNextQuestion() {
      if (!state.awaitingNext) return;
      askNewWord(state.total + 1, true);
    }

    function checkAnswer() {
      if (!state.currentWord || !state.awaitingAnswer) return;

      const raw = el.answerInput.value;
      const normalized = normalizeForCompare(raw);
      const acceptedForms = getAcceptedForms(state.currentWord);
      const accepted = acceptedForms.map(normalizeForCompare);
      const ok = accepted.includes(normalized);
      const wordToSpell = ok ? state.currentWord : acceptedForms[0];

      state.awaitingAnswer = false;
      state.awaitingNext = true;
      state.total += 1;
      if (ok) state.correct += 1;
      else state.wrong += 1;

      state.history.push({
        questionNumber: state.currentQuestionNumber,
        word: state.currentWord,
        answer: raw,
        ok,
        levelLabel: currentPracticeLabel(),
        scopeKey: getPoolKey()
      });

      state.lastResult = {
        ok,
        word: state.currentWord,
        answer: raw
      };

      showResult(ok, raw);
      playTone(ok);
      updateStats();
      renderHistory();
      renderPrompt();
      updateControls();
      if (state.awaitingNext) {
        el.advanceBtn.focus();
      }

      speak(ok ? 'Correct answer.' : 'Incorrect answer.', 0.82);
      setTimeout(() => {
        speak(`The spelling is: ${spellOutWord(wordToSpell)}.`, 0.68);
      }, 500);
    }

    el.historyFileInput.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file || state.started) return;
      await loadSessionOrWrongWordsFromFile(file);
    });

    el.clearReviewBtn.addEventListener('click', () => {
      if (state.started) return;
      clearLoadedPracticeFile();
    });

    el.loadModeSelect.addEventListener('change', () => {
      if (state.started || !loadedFileCache.text) return;
      applyLoadedText(loadedFileCache.text, loadedFileCache.name);
    });

    el.levelSelect.addEventListener('change', (e) => {
      state.currentLevel = e.target.value;
      if (!state.awaitingAnswer && !state.started) {
        renderPrompt();
      }
      updateProgressNote();
    });

    el.noRepeatCheck.addEventListener('change', () => {
      updateProgressNote();
    });

    el.nextBtn.addEventListener('click', () => {
      if (!state.started) askNewWord(state.total + 1, true);
    });

    el.speakBtn.addEventListener('click', () => {
      if (!state.currentWord) return;
      speakWordPrompt(state.currentWord, null);
    });

    el.saveHistoryBtn.addEventListener('click', saveHistoryAsText);

    el.checkBtn.addEventListener('click', checkAnswer);

    el.advanceBtn.addEventListener('click', () => {
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
      moveToNextQuestion();
    });

    function handlePracticeEnterKey(e) {
      if (e.key !== 'Enter' || e.repeat || e.isComposing) return;
      if (!state.started) return;

      if (state.awaitingAnswer) {
        e.preventDefault();
        checkAnswer();
        return;
      }

      if (state.awaitingNext) {
        e.preventDefault();
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        moveToNextQuestion();
      }
    }

    document.addEventListener('keydown', handlePracticeEnterKey);

    updateStats();
    renderHistory();
    renderPrompt();
    updateControls();

  </script>
</body>
</html>
